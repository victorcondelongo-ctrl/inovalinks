<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InovAI — Automação & IA para Negócios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #4B6BFF;
    --purple: #8B3DFF;
    --violet: #6B4EFF;
    --bg: #0A0A12;
    --surface: #12121E;
    --surface2: #1A1A2E;
    --border: rgba(107, 78, 255, 0.2);
    --text: #F0EEFF;
    --muted: rgba(240, 238, 255, 0.55);
    --glow-blue: rgba(75, 107, 255, 0.15);
    --glow-purple: rgba(139, 61, 255, 0.15);
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
  }

  body {
    display: flex;
    justify-content: center;
    padding: 48px 16px 80px;
    background-image:
      radial-gradient(ellipse 60% 40% at 20% -10%, rgba(75,107,255,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 50% 35% at 80% 5%, rgba(139,61,255,0.16) 0%, transparent 65%),
      radial-gradient(ellipse 40% 30% at 50% 100%, rgba(107,78,255,0.10) 0%, transparent 70%);
  }

  .container {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* HEADER */
  .header {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    margin-bottom: 32px;
  }

  .logo-wrap {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    overflow: hidden;
    position: relative;
  }

  .logo-wrap::after {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(75,107,255,0.5), rgba(139,61,255,0.5));
    z-index: -1;
  }

  .logo-wrap img {
    width: 72px;
    height: auto;
  }

  .name {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(90deg, #4B6BFF 0%, #8B3DFF 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }

  .tagline {
    font-size: 13px;
    color: var(--muted);
    font-weight: 400;
    max-width: 260px;
    line-height: 1.5;
  }

  /* SOCIAL ICONS */
  .social-row {
    display: flex;
    gap: 16px;
    margin-bottom: 36px;
  }

  .social-icon {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    transition: transform 0.2s, border-color 0.2s, background 0.2s;
    cursor: pointer;
  }

  .social-icon:hover {
    transform: translateY(-3px);
    border-color: rgba(107,78,255,0.6);
    background: rgba(107,78,255,0.12);
  }

  .social-icon svg {
    width: 20px;
    height: 20px;
  }

  /* LINKS */
  .links-section {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 36px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    text-decoration: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
  }

  .link-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, var(--glow-blue), var(--glow-purple));
    opacity: 0;
    transition: opacity 0.2s;
  }

  .link-btn:hover {
    transform: translateY(-2px);
    border-color: rgba(107,78,255,0.5);
  }

  .link-btn:hover::before { opacity: 1; }

  .link-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .link-icon.whatsapp { background: rgba(37,211,102,0.15); }
  .link-icon.youtube { background: rgba(255,0,0,0.15); }
  .link-icon.instagram { background: rgba(225,48,108,0.15); }

  .link-icon svg { width: 22px; height: 22px; }

  .link-text {
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
  }

  .link-label {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
  }

  .link-sub {
    font-size: 12px;
    color: var(--muted);
    font-weight: 400;
  }

  .link-arrow {
    margin-left: auto;
    color: var(--muted);
    position: relative;
    z-index: 1;
    transition: transform 0.2s;
  }

  .link-btn:hover .link-arrow { transform: translateX(4px); }

  /* VIDEO SECTION */
  .video-section {
    width: 100%;
    margin-bottom: 36px;
  }

  .section-label {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 14px;
  }

  .video-card {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
  }

  .video-title-bar {
    padding: 14px 18px 10px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
  }

  .video-wrapper {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%;
    height: 0;
    overflow: hidden;
  }

  .video-wrapper iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }

  /* FOOTER */
  .footer {
    font-size: 12px;
    color: rgba(240,238,255,0.25);
    text-align: center;
    margin-top: 8px;
  }

  /* DIVIDER */
  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 8px 0 24px;
  }

  /* Grain overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.4;
  }

  @media (max-width: 480px) {
    body { padding: 36px 16px 60px; }
    .name { font-size: 24px; }
  }
</style>
</head>
